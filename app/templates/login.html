<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ESFORCA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d3b66 0%, #1c6ca8 50%, #2a8fd4 100%);
            padding: 1.5rem;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(20px);
        }
        .login-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #0d3b66, #1c6ca8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .login-logo i { color: white; font-size: 2rem; }
        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0d3b66;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: #6b7280;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-floating {
            margin-bottom: 1rem;
        }
        .form-floating input {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 1rem 0.75rem;
            height: auto;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-floating input:focus {
            border-color: #1c6ca8;
            box-shadow: 0 0 0 4px rgba(28, 108, 168, 0.1);
        }
        .form-floating label {
            padding: 1rem 0.75rem;
            color: #6b7280;
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #0d3b66, #1c6ca8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(13, 59, 102, 0.3);
            color: white;
        }
        .btn-login:active { transform: translateY(0); }
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
            color: #6b7280;
            font-size: 0.85rem;
        }
        .login-footer i { margin-right: 0.4rem; }
        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1 class="login-title">Bienvenue</h1>
        <p class="login-subtitle">Connectez-vous à votre espace</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-floating">
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Nom d'utilisateur" required>
                <label for="id_username"><i class="far fa-user me-2"></i>Nom d'utilisateur</label>
            </div>
            <div class="form-floating">
                <input type="password" name="password" id="id_password" class="form-control" placeholder="Mot de passe" required>
                <label for="id_password"><i class="fas fa-lock me-2"></i>Mot de passe</label>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket me-2"></i>Se connecter
            </button>
        </form>

        <div class="login-footer">
            <i class="fas fa-circle-info"></i>En cas de problème, contactez le service informatique
        </div>
    </div>
</body>
</html>
