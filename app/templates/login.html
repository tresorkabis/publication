{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h2 class="text-2xl font-bold text-center text-blue-900 mb-8">Connexion au Portail</h2>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-6">
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-2">Nom d'utilisateur</label>
                <input type="text" name="username" id="id_username" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-8">
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                <input type="password" name="password" id="id_password" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-md font-semibold hover:bg-blue-800 transition shadow-md">Se connecter</button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-500">
            En cas de problème, contactez le service informatique.
        </div>
    </div>
</div>
{% endblock %}
