{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">Modifier la Note</h2>
        
        <div class="mb-6 p-4 bg-blue-50 rounded-lg text-sm text-blue-800">
            <p><strong>Étudiant :</strong> {{ cotation.etudiant.user.last_name }} {{ cotation.etudiant.user.first_name }}</p>
            <p><strong>Cours :</strong> {{ cotation.evaluation.cours.libelle }}</p>
            <p><strong>Évaluation :</strong> {{ cotation.evaluation.lib }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-6">
                <label for="id_note" class="block text-sm font-medium text-gray-700 mb-2">Nouvelle Note</label>
                <input type="text" name="note" id="id_note" value="{{ cotation.note }}" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 text-center font-bold text-xl">
            </div>
            <div class="flex space-x-3">
                <a href="{% url 'manage_marks' cotation.evaluation.idevaluation %}" class="flex-1 text-center bg-gray-100 text-gray-700 py-3 rounded-md font-semibold hover:bg-gray-200 transition">Annuler</a>
                <button type="submit" class="flex-1 bg-blue-700 text-white py-3 rounded-md font-semibold hover:bg-blue-800 transition shadow-md">Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
