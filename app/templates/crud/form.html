{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ action }} {{ model_name }}</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        <div class="grid gap-5 md:grid-cols-2">
            {% for field in form %}
                <div class="space-y-2">
                    <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-slate-700">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <p class="text-sm text-red-600">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}
        </div>
        <button type="submit" class="bg-blue-700 text-white px-5 py-3 rounded-xl font-semibold hover:bg-blue-800 transition">{{ action }}</button>
    </form>
</div>
{% endblock %}
